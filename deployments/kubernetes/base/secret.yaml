apiVersion: v1
kind: Secret
metadata:
  name: freightliner-secrets
  namespace: freightliner
  labels:
    app.kubernetes.io/name: freightliner
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # API Keys - OVERRIDE IN PRODUCTION
  api-key: "changeme-api-key"

  # AWS Credentials - OVERRIDE IN PRODUCTION
  aws-access-key-id: ""
  aws-secret-access-key: ""

  # GCP Service Account - OVERRIDE IN PRODUCTION
  gcp-service-account-key: ""

  # Registry Authentication - OVERRIDE IN PRODUCTION
  registry-auth: ""

  # Encryption Keys - OVERRIDE IN PRODUCTION
  encryption-key: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: freightliner-registry-credentials
  namespace: freightliner
  labels:
    app.kubernetes.io/name: freightliner
    app.kubernetes.io/component: registry-auth
type: kubernetes.io/dockerconfigjson
data:
  # Docker registry credentials - OVERRIDE IN PRODUCTION
  .dockerconfigjson: e30K  # Empty JSON object base64 encoded: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: freightliner-tls
  namespace: freightliner
  labels:
    app.kubernetes.io/name: freightliner
    app.kubernetes.io/component: tls
type: kubernetes.io/tls
data:
  # TLS certificate and key - OVERRIDE IN PRODUCTION
  tls.crt: ""
  tls.key: ""
